<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hahmogeneraattori</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; max-width: 800px; margin: 20px auto; }
        button { padding: 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; background: #333; color: white; transition: 0.2s; }
        button:hover { background: #555; transform: scale(1.05); }
        .viking { background: #4a2c2a; } .cartoon { background: #2a4a2c; }
        #output-container { margin-top: 30px; min-height: 300px; }
        img { max-width: 100%; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #loading { display: none; margin: 20px; color: #ffcc00; font-weight: bold; }
        input { padding: 10px; width: 80%; max-width: 400px; border-radius: 5px; border: none; margin: 10px; }
        .token-section { background: #222; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <h1>AI Hahmonluonti</h1>

    <div class="token-section">
        <input type="password" id="apiToken" placeholder="Liitä Hugging Face Token tähän...">
        <button onclick="saveToken()" style="padding: 10px;">Tallenna Token</button>
    </div>

    <input type="text" id="userPrompt" placeholder="Kirjoita lyhyt kuvaus (esim. mies jolla on parta)...">

    <div class="grid">
        <button class="viking" onclick="generate('viking')">VIINKINKI</button>
        <button class="cartoon" onclick="generate('pixar')">PIXAR-HAHMO</button>
        <button onclick="generate('gta')">GTA TYyli</button>
        <button onclick="generate('anime')">ANIME</button>
        <button onclick="generate('cyberpunk')">CYBERPUNK</button>
        <button onclick="generate('statue')">PATSAS</button>
        <button onclick="generate('zombie')">ZOMBI</button>
        <button onclick="generate('oilpainting')">ÖLJYVÄRI</button>
        <button onclick="generate('minecraft')">MINECRAFT</button>
        <button onclick="generate('superhero')">SUPERKANKARI</button>
    </div>

    <div id="loading">Taikuus tapahtuu... Odota hetki (n. 30-60s)</div>
    
    <div id="output-container">
        <div id="resultImage"></div>
    </div>

    <script>
        // Tallentaa tokenin selaimeen, ettei sitä tarvitse aina hakea
        function saveToken() {
            const token = document.getElementById('apiToken').value;
            localStorage.setItem('hf_token', token);
            alert("Token tallennettu!");
        }

        // Ladataan tallennettu token jos se löytyy
        window.onload = () => {
            const savedToken = localStorage.getItem('hf_token');
            if (savedToken) document.getElementById('apiToken').value = savedToken;
        }

        async function generate(style) {
            const token = document.getElementById('apiToken').value;
            const userInput = document.getElementById('userPrompt').value;
            const loading = document.getElementById('loading');
            const resultDiv = document.getElementById('resultImage');

            if (!token) return alert("Lisää ensin API-token!");
            
            loading.style.display = "block";
            resultDiv.innerHTML = "";

            // Tyylien prompt-lisäykset
            const styles = {
                viking: "realistic viking warrior, cinematic lighting, fur armor, rugged, hyper-detailed",
                pixar: "disney pixar 3d cartoon style, cute, smooth textures, big eyes, 8k render",
                gta: "GTA V loading screen art style, bold lines, high contrast, illustrated",
                anime: "studio ghibli anime style, soft colors, hand-drawn aesthetic",
                cyberpunk: "cyberpunk 2077 style, neon lights, futuristic armor, glowing elements",
                statue: "ancient roman marble statue, cracked stone, museum lighting",
                zombie: "scary zombie, decayed skin, horror movie style, cinematic",
                oilpainting: "classic old oil painting, visible brushstrokes, canvas texture, masterpiece",
                minecraft: "minecraft blocky voxel style, pixelated, 3d blocks",
                superhero: "marvel comic book style, heroic pose, vibrant colors, cel-shaded"
            };

            const fullPrompt = `${userInput}, ${styles[style]}`;

            try {
                // Käytetään Flux Schnell -mallia (nopea ja ilmainen)
                const response = await fetch(
                    "https://api-inference.huggingface.co/models/black-forest-labs/FLUX.1-schnell",
                    {
                        headers: { Authorization: `Bearer ${token}` },
                        method: "POST",
                        body: JSON.stringify({ inputs: fullPrompt }),
                    }
                );

                const blob = await response.blob();
                const imgUrl = URL.createObjectURL(blob);
                resultDiv.innerHTML = `<img src="${imgUrl}" alt="Generated AI Image">`;
            } catch (error) {
                alert("Virhe kuvatessa. Kokeile hetken päästä uudelleen.");
                console.error(error);
            } finally {
                loading.style.display = "none";
            }
        }
    </script>
</body>
</html>
