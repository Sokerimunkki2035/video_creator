<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hahmogeneraattori PRO</title>
    <style>
        body { font-family: sans-serif; background: #0f0f0f; color: #eee; text-align: center; padding: 15px; }
        .token-box { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; }
        input { padding: 12px; width: 85%; max-width: 400px; border-radius: 8px; border: 1px solid #444; background: #222; color: white; margin: 5px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; max-width: 700px; margin: 20px auto; }
        button { padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: #333; color: white; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        .main-btn { background: #3d3d3d; border-bottom: 3px solid #1a1a1a; }
        .viking { background: #634133; }
        .pixar { background: #336354; }
        #loading { display: none; color: #00d4ff; margin: 20px; font-weight: bold; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        img { max-width: 100%; border-radius: 12px; margin-top: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.7); }
        .error-log { color: #ff4444; font-size: 0.8em; margin-top: 10px; display: none; background: #221111; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <h2>AI Hahmogeneraattori</h2>

    <div class="token-box">
        <input type="password" id="apiToken" placeholder="Liitä hf_alkuinen token...">
        <button onclick="saveToken()">Tallenna</button>
    </div>

    <input type="text" id="userPrompt" placeholder="Mitä kuvassa on? (esim. mies parta)...">

    <div class="grid">
        <button class="main-btn viking" onclick="generate('viking')">VIIKINKI</button>
        <button class="main-btn pixar" onclick="generate('pixar')">PIXAR</button>
        <button class="main-btn" onclick="generate('gta')">GTA</button>
        <button class="main-btn" onclick="generate('anime')">ANIME</button>
        <button class="main-btn" onclick="generate('cyberpunk')">CYBERPUNK</button>
        <button class="main-btn" onclick="generate('zombie')">ZOMBI</button>
        <button class="main-btn" onclick="generate('oil')">ÖLJYVÄRI</button>
        <button class="main-btn" onclick="generate('hero')">SANKARI</button>
    </div>

    <div id="loading">Yritetään luoda kuvaa...</div>
    <div id="errorDisplay" class="error-log"></div>
    <div id="result"></div>

    <script>
        function saveToken() {
            const t = document.getElementById('apiToken').value.trim();
            if(!t.startsWith('hf_')) return alert("Tokenin pitää alkaa 'hf_'!");
            localStorage.setItem('hf_token_v2', t);
            alert("Token tallennettu!");
        }

        window.onload = () => {
            const saved = localStorage.getItem('hf_token_v2');
            if (saved) document.getElementById('apiToken').value = saved;
        }

        async function generate(style) {
            const token = document.getElementById('apiToken').value.trim();
            const input = document.getElementById('userPrompt').value || "man";
            const load = document.getElementById('loading');
            const err = document.getElementById('errorDisplay');
            const res = document.getElementById('result');

            if (!token) return alert("Pistä token yläpalkkiin!");

            load.style.display = "block";
            err.style.display = "none";
            res.innerHTML = "";

            const prompts = {
                viking: "realistic viking warrior, cinematic, hyperdetailed",
                pixar: "disney pixar style cartoon character, 3d render",
                gta: "gta v loading screen art style",
                anime: "studio ghibli style anime art",
                cyberpunk: "cyberpunk 2077 aesthetic, neon lights",
                zombie: "scary horror zombie, cinematic",
                oil: "masterpiece oil painting, thick brushstrokes",
                hero: "superhero comic book style"
            };

            const fullPrompt = input + ", " + prompts[style];

            try {
                // VAIHDETTU MALLI: Stable Diffusion XL on vakaampi ilmaisessa käytössä
                const response = await fetch(
                    "https://api-inference.huggingface.co/models/stabilityai/stable-diffusion-xl-base-1.0",
                    {
                        headers: { 
                            "Authorization": `Bearer ${token}`,
                            "Content-Type": "application/json"
                        },
                        method: "POST",
                        body: JSON.stringify({ inputs: fullPrompt }),
                    }
                );

                if (response.status === 503) {
                    load.innerText = "Malli heräilee (HF 503)... yritetään taas 5s kuluttua.";
                    setTimeout(() => generate(style), 5000);
                    return;
                }

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HF virhe: ${response.status} - ${errorText}`);
                }

                const blob = await response.blob();
                res.innerHTML = `<img src="${URL.createObjectURL(blob)}">`;
            } catch (e) {
                err.style.display = "block";
                err.innerText = "VIRHE: " + e.message;
                console.error(e);
            } finally {
                if (!load.innerText.includes("yritetään")) load.style.display = "none";
            }
        }
    </script>
</body>
</html>
